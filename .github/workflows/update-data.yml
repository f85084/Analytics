name: Auto Update Stock Data (09:07 TW start, every 30min until 13:37)

on:
  workflow_dispatch:
  schedule:
    # Trigger once near market open, then keep updating within the same job.
    - cron: '7 1 * * 1-5'

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build and publish updates
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            runs=1
          else
            runs=10
          fi

          for i in $(seq 1 "$runs"); do
            echo "Update iteration $i/$runs"
            npm run build:data
            git add docs/data.json

            if git diff --cached --quiet -- docs/data.json; then
              echo "No data changes to commit."
            else
              git commit -m "chore: update stock data"
              if ! git push origin HEAD:${{ github.ref_name }}; then
                git pull --rebase origin "${{ github.ref_name }}"
                git push origin HEAD:${{ github.ref_name }}
              fi
            fi

            if [ "$i" -lt "$runs" ]; then
              sleep 1800
            fi
          done
