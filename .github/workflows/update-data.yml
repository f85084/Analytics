name: Auto Update Stock Data (09:07-13:37 TW, every 30min)

on:
  workflow_dispatch:
  schedule:
    # Avoid :00 / :30 because GitHub's shared cron runners are more likely
    # to be delayed or dropped at peak minute boundaries.
    - cron: '7,37 1-5 * * 1-5'

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build data
        run: npm run build:data

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --cached --quiet -- docs/data.json; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: update stock data"
          git push origin HEAD:${{ github.ref_name }}
