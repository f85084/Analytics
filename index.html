<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 股市推薦與分析看板</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            line-height: 1.6; 
            color: #1e293b; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: var(--bg); 
        }
        header { text-align: center; margin-bottom: 40px; }
        h1 { color: #0f172a; margin-bottom: 8px; }
        .subtitle { color: var(--secondary); font-size: 1.1em; }
        
        .filters { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 30px; 
        }
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            align-items: start;
            width: 100%;
        }

        .stock-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 2px solid transparent;
            width: 100%;
            box-sizing: border-box;
        }
        .stock-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .stock-card.recommended {
            border-color: #dbeafe;
            background: linear-gradient(to bottom right, #ffffff, #f0f7ff);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .stock-info h2 { margin: 0; font-size: 1.25em; color: #0f172a; }
        .ticker { color: var(--secondary); font-size: 0.9em; }
        
        .strategy-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .strategy-breakout { background: #fee2e2; color: #991b1b; }
        .strategy-trend { background: #dcfce7; color: #166534; }
        .strategy-rebound { background: #fef3c7; color: #92400e; }
        .strategy-neutral { background: #f1f5f9; color: #475569; }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 5px;
        }
        .price { font-size: 1.5em; font-weight: 700; color: #1e293b; }

        .weekly-trend {
            margin-bottom: 15px;
            font-size: 0.85em;
            padding: 4px 8px;
            background: #f8fafc;
            border-radius: 4px;
            display: inline-block;
        }
        .trend-up { color: #ef4444; font-weight: bold; }
        .trend-down { color: #22c55e; font-weight: bold; }

        .why-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #e2e8f0;
            display: none;
        }
        .why-section.active { display: block; }
        .why-title { 
            font-weight: 600; 
            font-size: 0.9em; 
            color: var(--primary); 
            margin-bottom: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            width: 100%;
        }
        .why-title .arrow {
            transition: transform 0.3s;
        }
        .why-section.active .arrow {
            transform: rotate(180deg);
        }
        .reason-list { margin: 0; padding-left: 20px; font-size: 0.9em; color: #475569; }
        .reason-list li { margin-bottom: 4px; }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
            font-size: 0.8em;
            color: var(--secondary);
        }
        .metric-item { background: #f8fafc; padding: 6px; border-radius: 4px; }

        .empty-state { text-align: center; grid-column: 1 / -1; padding: 40px; color: var(--secondary); }
        .last-updated { text-align: center; margin-top: 40px; font-size: 0.8em; color: var(--secondary); }
    </style>
</head>
<body>
    <header>
        <h1>AI 股市推薦看板</h1>
        <p class="subtitle">根據布林通道與均線斜率進行的大數據分析推薦</p>
    </header>

    <div class="filters">
        <button class="filter-btn active" onclick="filterData('all')">全部股票</button>
        <button class="filter-btn" onclick="filterData('recommended')">🔥 智慧推薦</button>
        <button class="filter-btn" onclick="filterData('breakout')">突破佈局</button>
        <button class="filter-btn" onclick="filterData('trend')">多頭延續</button>
        <button class="filter-btn" onclick="filterData('rebound')">超跌反彈</button>
    </div>

    <div id="stock-grid" class="stock-grid">
        <!-- Cards will be inserted here -->
    </div>

    <div class="last-updated">最後更新: <span id="last-updated-time">-</span></div>

    <script>
        let allData = [];
        let currentFilter = 'all';

        async function loadData() {
            try {
                const response = await fetch('data.json');
                allData = await response.json();
                
                // Sort by recommendation score
                allData.sort((a, b) => (b.analysis.score || 0) - (a.analysis.score || 0));
                
                if (allData.length > 0) {
                    document.getElementById('last-updated-time').textContent = new Date(allData[0].updatedAt).toLocaleString();
                }
                
                renderGrid();
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }

        function getStrategyClass(strategy) {
            if (strategy === '突破佈局') return 'strategy-breakout';
            if (strategy === '多頭延續') return 'strategy-trend';
            if (strategy === '超跌反彈') return 'strategy-rebound';
            return 'strategy-neutral';
        }

        function filterData(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick').includes(filter)) btn.classList.add('active');
            });
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('stock-grid');
            grid.innerHTML = '';

            const filtered = allData.filter(item => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'recommended') return item.analysis.score > 0;
                if (currentFilter === 'breakout') return item.analysis.strategy === '突破佈局';
                if (currentFilter === 'trend') return item.analysis.strategy === '多頭延續';
                if (currentFilter === 'rebound') return item.analysis.strategy === '超跌反彈';
                return true;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">目前沒有符合此篩選條件的股票。</div>';
                return;
            }

                filtered.forEach(item => {
                    const isRec = item.analysis.score > 0;
                    const card = document.createElement('div');
                    card.className = `stock-card ${isRec ? 'recommended' : ''}`;
                    card.onclick = () => {
                        const why = card.querySelector('.why-section');
                        why.classList.toggle('active');
                    };

                    const strategyClass = getStrategyClass(item.analysis.strategy);
                    const marketText = item.market === 'Listed' ? '上市' : '上櫃';
                    
                    const weeklyChange = item.weeklyChange || 0;
                    const trendClass = weeklyChange > 0 ? 'trend-up' : (weeklyChange < 0 ? 'trend-down' : '');
                    const trendArrow = weeklyChange > 0 ? '▲' : (weeklyChange < 0 ? '▼' : '');

                    card.innerHTML = `
                        <div class="card-header">
                            <div class="stock-info">
                                <h2>${item.name} <span class="ticker">${item.ticker}</span></h2>
                                <div style="font-size: 0.75em; color: var(--secondary); margin-top: 2px;">${marketText}</div>
                            </div>
                            <span class="strategy-badge ${strategyClass}">${item.analysis.strategy}</span>
                        </div>
                        
                        <div class="price-row">
                            <span class="price">$${item.price}</span>
                            <span style="font-size: 0.85em; color: ${item.analysis.score > 0 ? 'var(--success)' : 'var(--secondary)'}; font-weight: 600;">
                                ${item.analysis.score > 0 ? '推薦評分: ' + item.analysis.score : ''}
                            </span>
                        </div>

                        <div class="weekly-trend">
                            近一週漲跌: <span class="${trendClass}">${trendArrow} ${Math.abs(weeklyChange).toFixed(2)}%</span>
                        </div>

                        <div class="metrics-grid">
                            <div class="metric-item">布林位置: ${item.bbPosition}</div>
                            <div class="metric-item">均線斜率: ${item.smaSlope}%</div>
                        </div>

                        <div class="why-section">
                            <div class="why-title">
                                <span style="display: flex; align-items: center; gap: 4px;">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                                    數據分析 (為什麼推薦？)
                                </span>
                                <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </div>
                            <ul class="reason-list">
                                ${item.analysis.reasons.length > 0 
                                    ? item.analysis.reasons.map(r => `<li>${r}</li>`).join('')
                                    : '<li>目前指標處於中性區間，建議觀望。</li>'}
                            </ul>
                        </div>
                    `;
                    grid.appendChild(card);
                });
        }

        window.onload = loadData;
    </script>
</body>
</html>
